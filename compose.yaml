services:
  docsystem:
    image: iaemndor/docsystem-server
    depends_on:
      - db
      - seq
    ports:
      - "5207:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${DB}
      Seq__ServerUrl: http://seq:5341

  web:
    image: iaemndor/docsystem-web
    depends_on:
      - docsystem
    ports:
      - "4200:80"

  db:
    image: postgres:16
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DBUSR}
      POSTGRES_PASSWORD: ${DBPSWD}
      POSTGRES_DB: ${DBINSTANCE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  seq:
    image: datalust/seq:latest
    container_name: seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    ports:
      - "8081:80"
      - "5341:5341"
    volumes:
      - seq_data:/data

volumes:
  postgres_data:
  seq_data: